providers:
  - Laravel\Nightwatch\NightwatchServiceProvider
  - Laravel\Horizon\HorizonServiceProvider

workbench:
  start: '/'
  install: true
  discovers:
    web: true
    commands: true
    views: true
  build:
    - create-sqlite-db
    - migrate-refresh
  sync:
    - from: workbench/storage/logs
      to: storage/logs
